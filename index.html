<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이충현 날리기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0ede6;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
#app{width:100%;max-width:700px;padding:1rem;}
.card{background:#fff;border-radius:14px;border:1px solid #e0ddd6;padding:1.25rem;margin-bottom:1rem;}
input[type=text]{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;}
input[type=text]:focus{border-color:#111;}
.btn{width:100%;padding:13px;font-size:16px;font-weight:700;font-family:inherit;border-radius:10px;border:none;cursor:pointer;background:#111;color:#fff;}
.btn:active{transform:scale(0.98);}
h1{font-size:1.9rem;font-weight:900;letter-spacing:-1px;color:#111;text-align:center;margin-bottom:4px;}
.sub{font-size:13px;color:#888;text-align:center;margin-bottom:1.5rem;}
#canvas-wrap{width:100%;border-radius:12px;border:1px solid #c8e0b0;overflow:hidden;margin-bottom:0.75rem;}
canvas{display:block;width:100%;height:240px;}
#pw-wrap{display:flex;align-items:center;gap:10px;margin-bottom:0.75rem;}
#pw-bg{flex:1;height:22px;background:#eee;border-radius:11px;overflow:hidden;border:1px solid #ddd;}
#pw-fill{height:100%;width:0%;background:#111;border-radius:11px;}
#pw-pct{font-size:13px;color:#666;min-width:38px;text-align:right;font-weight:700;}
#tap-btn{width:100%;padding:16px;font-size:18px;font-weight:900;font-family:inherit;border-radius:12px;margin-bottom:0.75rem;cursor:pointer;background:#111;color:#fff;border:none;user-select:none;-webkit-user-select:none;}
#result-area{text-align:center;min-height:52px;margin-bottom:0.5rem;}
#result-dist{font-size:32px;font-weight:900;color:#111;}
#result-sub{font-size:13px;color:#888;margin-top:2px;}
.lb-title{font-size:14px;font-weight:700;color:#111;margin-bottom:10px;}
.lb-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0ede6;font-size:14px;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{min-width:24px;font-weight:700;color:#888;}
.lb-name{flex:1;color:#111;}
.lb-dist{font-weight:700;color:#111;}
#top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
#uname-tag{font-size:13px;color:#666;background:#f0ede6;padding:4px 12px;border-radius:20px;}
#logout-btn{font-size:12px;color:#aaa;background:none;border:none;cursor:pointer;text-decoration:underline;}
.screen{display:none;}
.screen.active{display:block;}
#fb-status{font-size:12px;color:#aaa;text-align:center;margin-bottom:0.5rem;}
</style>
</head>
<body>
<div id="app">

<div id="login-screen" class="screen active">
  <div style="padding:1.5rem 0 0.5rem;">
    <h1>이충현 날리기</h1>
    <p class="sub">꾹 눌러서 이충현을 멀리 날려보세요!</p>
  </div>
  <div id="fb-status">Firebase 연결 중...</div>
  <div class="card">
    <input type="text" id="nick-input" placeholder="닉네임 입력" maxlength="12"/>
    <button class="btn" id="login-btn">게임 시작!</button>
  </div>
  <div class="card">
    <p class="lb-title">🏆 리더보드</p>
    <div id="lb-login"><p style="font-size:13px;color:#aaa;">불러오는 중...</p></div>
  </div>
</div>

<div id="game-screen" class="screen">
  <div id="top-bar">
    <h1 style="font-size:1.3rem;">이충현 날리기</h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="uname-tag"></span>
      <button id="logout-btn">로그아웃</button>
    </div>
  </div>
  <div id="canvas-wrap"><canvas id="gc"></canvas></div>
  <div id="pw-wrap">
    <span style="font-size:13px;color:#666;font-weight:700;">파워</span>
    <div id="pw-bg"><div id="pw-fill"></div></div>
    <span id="pw-pct">0%</span>
  </div>
  <button id="tap-btn">꾹 눌러서 날리기!</button>
  <div id="result-area">
    <div id="result-dist"></div>
    <div id="result-sub"></div>
  </div>
  <div class="card">
    <p class="lb-title">🏆 리더보드 (실시간)</p>
    <div id="lb-game"><p style="font-size:13px;color:#aaa;">불러오는 중...</p></div>
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBv-8N_PaTnUz6t133h0Oy_h3-s6h0Y2h8",
  authDomain: "leechoung.firebaseapp.com",
  databaseURL: "https://leechoung-default-rtdb.firebaseio.com",
  projectId: "leechoung",
  storageBucket: "leechoung.firebasestorage.app",
  messagingSenderId: "43209474892",
  appId: "1:43209474892:web:47aed487f48800ecf505e9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
document.getElementById('fb-status').textContent = '✅ Firebase 연결됨';

db.ref('leaderboard').orderByChild('dist').limitToLast(10).on('value', snap => {
  let entries = [];
  snap.forEach(child => entries.push(child.val()));
  entries.sort((a,b) => b.dist - a.dist);
  renderLbData('lb-login', entries);
  renderLbData('lb-game', entries);
});

function renderLbData(id, entries) {
  let el = document.getElementById(id);
  if (!entries.length) { el.innerHTML = '<p style="font-size:13px;color:#aaa;">아직 기록 없음</p>'; return; }
  const m = ['🥇','🥈','🥉'];
  el.innerHTML = entries.map((r,i) =>
    `<div class="lb-row"><span class="lb-rank">${m[i]||('#'+(i+1))}</span><span class="lb-name">${esc(r.name)}</span><span class="lb-dist">${Number(r.dist).toFixed(1)}m</span></div>`
  ).join('');
}

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function saveToFirebase(name, dist) {
  let key = name.replace(/[.#$[\]]/g,'_');
  let userRef = db.ref('leaderboard/' + key);
  userRef.once('value').then(snap => {
    let existing = snap.val();
    if (!existing || dist > existing.dist) {
      userRef.set({ name: name, dist: dist, ts: Date.now() });
    }
  });
}

// ===== GAME =====
let user=null, power=0, charging=false, goingUp=true;
let phase='idle', ci=null, af=null;
let moleX=0, moleY=0, vx=0, vy=0, rot=0, totalDist=0, camX=0;
const GW=700, GH=240, GROUND_Y=GH-50, LAUNCH_X=120;

// GitHub raw 이미지 URL 사용
const IMG_FLY = new Image();
const IMG_REST = new Image();
IMG_FLY.crossOrigin = 'anonymous';
IMG_REST.crossOrigin = 'anonymous';
IMG_FLY.src = 'https://raw.githubusercontent.com/hypocreales2011-hash/lee/main/KakaoTalk_20260427_182633417_01.png';
IMG_REST.src = 'https://raw.githubusercontent.com/hypocreales2011-hash/lee/main/KakaoTalk_20260427_182633417.png';

let flyCanvas=null, restCanvas=null;
function mkTrans(img){
  try {
    let oc=document.createElement('canvas');
    oc.width=img.naturalWidth; oc.height=img.naturalHeight;
    let c=oc.getContext('2d'); c.drawImage(img,0,0);
    let id=c.getImageData(0,0,oc.width,oc.height),d=id.data;
    for(let i=0;i<d.length;i+=4){ if(d[i]>200&&d[i+1]>200&&d[i+2]>200) d[i+3]=0; }
    c.putImageData(id,0,0); return oc;
  } catch(e) { return img; }
}
function ensureTrans(){
  if(!flyCanvas&&IMG_FLY.complete&&IMG_FLY.naturalWidth>0) flyCanvas=mkTrans(IMG_FLY);
  if(!restCanvas&&IMG_REST.complete&&IMG_REST.naturalWidth>0) restCanvas=mkTrans(IMG_REST);
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('logout-btn').addEventListener('click', doLogout);
const tapBtn = document.getElementById('tap-btn');
tapBtn.addEventListener('mousedown', startCharge);
tapBtn.addEventListener('mouseup', release);
tapBtn.addEventListener('touchstart', startCharge, {passive:false});
tapBtn.addEventListener('touchend', release, {passive:false});

function doLogin(){
  let n=document.getElementById('nick-input').value.trim();
  if(!n){alert('닉네임을 입력해주세요!');return;}
  user=n;
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('uname-tag').textContent=n;
  initGame();
}
function doLogout(){
  user=null; cancelAnimationFrame(af);
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('nick-input').value='';
}

let canvas, ctx;
function initGame(){
  canvas=document.getElementById('gc');
  canvas.width=GW; canvas.height=GH;
  ctx=canvas.getContext('2d');
  resetIdle();
}
function resetIdle(){
  phase='idle'; moleX=LAUNCH_X; moleY=0; camX=0; totalDist=0; drawFrame();
}
function wx(worldX){ return worldX-camX; }

function drawBg(){
  ctx.fillStyle='#d4eeff'; ctx.fillRect(0,0,GW,GROUND_Y);
  ctx.fillStyle='#c5dfa0'; ctx.fillRect(0,GROUND_Y,GW,GH-GROUND_Y);
  ctx.strokeStyle='#8ab85a'; ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND_Y);ctx.lineTo(GW,GROUND_Y);ctx.stroke();
  ctx.setLineDash([3,3]);
  for(let mark=50;mark<=50000;mark+=50){
    let cx=wx(mark*5.5+LAUNCH_X);
    if(cx<-30||cx>GW+30) continue;
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,GROUND_Y);ctx.lineTo(cx,GROUND_Y+10);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(mark+'m',cx,GROUND_Y+22);
  }
  ctx.setLineDash([]);
  let px=wx(LAUNCH_X);
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.roundRect(px-45,GROUND_Y-16,90,14,4);ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('발판',px,GROUND_Y-5);
  ctx.fillStyle='rgba(255,255,255,0.75)';
  [[200,45,60,22],[550,65,80,28],[950,35,55,20],[1350,55,70,26],[100,85,50,18]].forEach(([wx2,cy,w,h])=>{
    let sx=((wx2-camX*0.3)%1800+1800)%1800-50;
    ctx.beginPath();ctx.ellipse(sx,cy,w,h,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(sx+28,cy-8,w*0.65,h*0.65,0,0,Math.PI*2);ctx.fill();
  });
}

function drawRestMole(wx2){
  ensureTrans();
  let src=restCanvas||IMG_REST;
  let w=110,h=90,cx=wx(wx2);
  ctx.drawImage(src,cx-w/2,GROUND_Y-h+8,w,h);
}
function drawFlyMole(wx2,wy,angle){
  ensureTrans();
  let src=flyCanvas||IMG_FLY;
  let w=120,h=100,cx=wx(wx2);
  ctx.save(); ctx.translate(cx,wy); ctx.rotate(angle);
  ctx.drawImage(src,-w/2,-h/2,w,h);
  ctx.restore();
}

function drawFrame(){
  if(!ctx)return;
  ctx.clearRect(0,0,GW,GH);
  drawBg();
  if(phase==='idle'){
    drawRestMole(LAUNCH_X);
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.font='bold 13px Noto Sans KR,sans-serif'; ctx.textAlign='center';
    ctx.fillText('버튼을 꾹 눌러 파워를 채우세요!',GW/2,28);
  } else if(phase==='flying'){
    ctx.fillStyle='rgba(0,0,0,0.06)';
    ctx.beginPath();ctx.ellipse(wx(moleX),GROUND_Y+5,22,6,0,0,Math.PI*2);ctx.fill();
    drawFlyMole(moleX,moleY,rot);
    let lx=wx(moleX)+18, ly=moleY-18;
    if(lx>GW-80) lx=wx(moleX)-85;
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.font='bold 15px Noto Sans KR,sans-serif'; ctx.textAlign='left';
    ctx.fillText(Math.round(totalDist)+'m',lx,ly);
  } else if(phase==='landed'){
    ctx.fillStyle='rgba(0,0,0,0.06)';
    ctx.beginPath();ctx.ellipse(wx(moleX),GROUND_Y+2,40,9,0,0,Math.PI*2);ctx.fill();
    drawRestMole(moleX);
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(wx(LAUNCH_X),GROUND_Y-22);ctx.lineTo(wx(moleX),GROUND_Y-22);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText(totalDist.toFixed(1)+'m',wx((LAUNCH_X+moleX)/2),GROUND_Y-28);
  }
}

function startFly(pw){
  phase='flying';
  let angle=48*Math.PI/180;
  let spd=3+pw*0.28;
  moleX=LAUNCH_X; moleY=GROUND_Y-90;
  vx=Math.cos(angle)*spd; vy=-Math.sin(angle)*spd;
  rot=0; totalDist=0; camX=0;
  flyLoop();
}
function flyLoop(){
  vy+=0.28; moleX+=vx; moleY+=vy;
  totalDist=Math.max(0,(moleX-LAUNCH_X)/5.5);
  rot=Math.atan2(vy,vx);
  let targetCamX=moleX-GW*0.38;
  if(targetCamX<0) targetCamX=0;
  camX+=(targetCamX-camX)*0.12;
  if(moleY>=GROUND_Y-52){
    moleY=GROUND_Y-52; phase='landed';
    let landTarget=moleX-GW*0.5; if(landTarget<0)landTarget=0;
    camX=landTarget;
    let d=Math.round(totalDist*10)/10;
    finishFly(d); drawFrame(); return;
  }
  drawFrame(); af=requestAnimationFrame(flyLoop);
}
function finishFly(d){
  saveToFirebase(user, d);
  document.getElementById('result-dist').textContent=d.toFixed(1)+'m';
  document.getElementById('result-sub').textContent='기록 저장 중... 🔥';
  setTimeout(()=>{ document.getElementById('result-sub').textContent='✅ 저장 완료!'; },1000);
}

function updateBar(pct){
  pct=Math.round(pct);
  document.getElementById('pw-fill').style.width=pct+'%';
  let col=pct>85?'#d63031':pct>60?'#e17055':'#111';
  document.getElementById('pw-fill').style.background=col;
  document.getElementById('pw-pct').textContent=pct+'%';
  document.getElementById('tap-btn').style.background=pct>85?'#d63031':'#111';
}
function startCharge(e){
  if(e) e.preventDefault();
  if(phase==='flying') return;
  cancelAnimationFrame(af);
  resetIdle();
  power=0; charging=true; goingUp=true;
  document.getElementById('result-dist').textContent='';
  document.getElementById('result-sub').textContent='';
  ci=setInterval(()=>{
    if(goingUp){ power=Math.min(100,power+3); if(power>=100)goingUp=false; }
    else { power=Math.max(0,power-3); if(power<=0)goingUp=true; }
    updateBar(power);
  },30);
}
function release(e){
  if(e) e.preventDefault();
  if(!charging) return;
  charging=false; clearInterval(ci);
  document.getElementById('tap-btn').style.background='#111';
  let pw=power; power=0; updateBar(0);
  startFly(pw);
}
</script>
</body>
</html>
